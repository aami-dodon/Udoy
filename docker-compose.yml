services:
  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
    env_file:
      - ./.env.example
      - ./client/.env.example
      - ./.env
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    depends_on:
      - server
    environment:
      VITE_API_BASE_URL: "http://localhost:${SERVER_HOST_PORT:-5000}"
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    env_file:
      - ./.env.example
      - ./server/.env.example
      - ./.env
    ports:
      - "${SERVER_HOST_PORT:-5000}:5000"
    environment:
      PORT: "${SERVER_PORT:-5000}"
